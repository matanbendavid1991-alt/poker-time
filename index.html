<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>פוקר 2025 העיגול - Poker OS Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght=600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --danger: #ff3b30; --success: #34c759; --royal-blue: #1a3a6c; --dark-blue: #0d1b31; }
        * { box-sizing: border-box; }
        
        body {
            margin: 0; background-color: black; color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden; user-select: none;
        }

        /* --- פס התקדמות זמן עליון --- */
        #progressBar {
            position: absolute; top: 0; left: 0; height: 4px; background: var(--gold);
            box-shadow: 0 0 10px var(--gold); width: 100%; transition: width 1s linear; z-index: 1000;
        }

        /* --- מסך פתיחה דינמי ומעודכן --- */
        #splashScreen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        
        #splashLogo {
            width: 280px;
            height: 280px;
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            transform: scale(0.85);
            animation: splashEntrance 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes splashEntrance {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        #setupScreen { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; justify-content: center; align-items: center; overflow-y: auto; padding: 20px 0; }
        .setup-card { background: #1a1a1a; padding: 30px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; width: 400px; max-height: 95vh; overflow-y: auto; }
        .setup-card input { background: #333; border: none; color: white; padding: 12px; border-radius: 10px; width: 80%; text-align: center; font-size: 1.2em; margin: 8px 0; }
        .setup-card .num-input { width: 80px; font-size: 1.8em; }
        
        .friends-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; max-height: 35vh; overflow-y: auto; padding: 10px; }
        .friend-circle { 
            aspect-ratio: 1; background: #262626; border: 2px solid #444; border-radius: 50%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 1.1em; color: #ccc; cursor: pointer; position: relative;
            transition: all 0.2s ease;
        }
        .friend-circle.selected { 
            border-color: var(--gold); background: #332a00; color: white; 
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
        }
        .friend-circle .v-badge { 
            position: absolute; top: -2px; right: -2px; background: var(--gold); color: black; 
            width: 22px; height: 22px; border-radius: 50%; font-size: 0.8em; 
            display: flex; justify-content: center; align-items: center; display: none;
        }
        .friend-circle.selected .v-badge { display: flex; }

        .slider-wrapper { 
            display: flex; width: 200vw; height: 100vh; 
            transition: transform 0.5s cubic-bezier(0.15, 0.3, 0.25, 1); 
            display: none; 
        }
        .page { width: 100vw; height: 100vh; position: relative; overflow: hidden; flex-shrink: 0; }

        /* --- קפסולות עצמאיות ללא מסגרת רוחבית מפריעה --- */
        .admin-header { 
            position: absolute; top: 15px; width: 100%; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; z-index: 30; 
            background: none; backdrop-filter: none; -webkit-backdrop-filter: none; border: none;
        }
        
        /* קפסולת השעון */
        .game-clock { 
            font-size: 2.2vw; font-family: 'Rajdhani', monospace; color: var(--gold); font-weight: bold; 
            background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 8px 22px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* --- כפתורי ניווט בליינדים (שמאל למעלה) --- */
        .blind-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .blind-nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.2rem;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .blind-nav-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        .blind-info { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 6px 18px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        
        .logo-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; text-align: center; }
        .app-logo { width: 240px; height: 240px; background-image: url('logo.png'); background-size: contain; background-repeat: no-repeat; background-position: center; }

        .timer { position: absolute; display: flex; justify-content: center; align-items: center; font-weight: 900; transition: opacity 0.3s ease; pointer-events: none; z-index: 10; }
        .time-val { font-family: 'Rajdhani', sans-serif; font-size: 18vw; line-height: 1; transition: transform 0.2s ease; }

        .top { top: 2vh; left: 50%; transform: translateX(-50%) rotate(180deg); } /* עודכן ל-2vh */
        .bottom { bottom: 6vh; left: 50%; transform: translateX(-50%); }
        .left { left: 8vw; top: 50%; transform: translate(-50%, -50%) rotate(90deg); }
        .right { right: 8vw; top: 50%; transform: translate(50%, -50%) rotate(-90deg); }

        .ready-active { opacity: 1 !important; }
        .paused-dim { opacity: 0.3 !important; } 

        .warning .time-val { color: var(--danger); animation: pulse-warning 1s infinite; }
        @keyframes pulse-warning { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .zero-blink .time-val { animation: pulseZero 0.5s infinite; color: var(--danger); }

        /* --- עיצוב שולחן כחול רויאל פרימיום --- */
        .poker-table { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); 
            width: 75vw; height: 42vh; border: 15px solid #222; border-radius: 160px; 
            background: radial-gradient(circle, var(--royal-blue) 0%, var(--dark-blue) 100%); 
            box-shadow: inset 0 0 70px #000, 0 15px 40px rgba(0,0,0,0.7); 
            display: flex; justify-content: center; align-items: center;
        }
        
        .poker-table::after {
            content: "פווקר 2025"; position: absolute; font-family: 'Rajdhani', sans-serif;
            font-size: 4.5vw; font-weight: 700; color: rgba(255,255,255,0.03); letter-spacing: 12px; pointer-events: none;
        }

        .table-inner-line {
            position: absolute; inset: 15px; border: 2px solid rgba(255, 204, 0, 0.12); border-radius: 145px; pointer-events: none;
        }

        .player-seat { 
            position: absolute; width: 90px; height: 90px; background: #151515; border: 2px solid #333; border-radius: 50%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 15px; transform: translate(-50%, -50%); 
            box-shadow: 0 6px 15px rgba(0,0,0,0.6), 0 0 10px rgba(255,204,0,0.15); z-index: 50; transition: all 0.3s ease; 
        }
        .player-seat.in-game { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 204, 0, 0.35), inset 0 0 8px rgba(255,254,0,0.1); }
        .player-seat.seat-removed { opacity: 0.35; filter: grayscale(0.8); border-style: dashed; }

        .chip-icon { display: inline-flex; justify-content: center; align-items: center; width: 3.5vw; height: 3.5vw; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.3); font-weight: bold; font-size: 1.6vw; color: white; }

        .total-pot-container { text-align: center; margin-top: 78vh; }
        .total-pot-container h2 { font-family: 'Rajdhani', sans-serif; font-size: 7vw; color: var(--gold); margin: 0; font-weight: 700; }

        .page-dots { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100; }
        .dot { width: 10px; height: 10px; background: #333; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--gold); width: 30px; border-radius: 10px; }

        .controls { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 15px; z-index: 40; }
        .btn { background: #1a1a1a; border: 1px solid #444; color: white; padding: 14px 24px; border-radius: 14px; font-weight: bold; font-size: 1.1em; cursor: pointer; }

        /* --- כפתור גלגל שיניים צף --- */
        #settings-gear-btn {
            position: fixed;
            right: 25px;
            bottom: 25px;
            font-size: 1.8rem;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background 0.2s;
        }
        #settings-gear-btn:active { transform: rotate(45deg) scale(0.9); }

        /* --- מודלים (הגדרות, ריביי, סיום משחק) --- */
        .modal, #rebuyModal, #endGameModal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #1a1a1a; padding: 30px; border-radius: 30px; border: 3px solid var(--gold); 
            z-index: 10000; text-align: center; width: 360px; max-height: 85vh; overflow-y: auto; 
        }
        
        /* חלון ההגדרות צריך מעטפת שחורה מאחוריו */
        .settings-overlay {
            display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 9999;
        }

        .modal-input { width: 90%; padding: 18px; margin-bottom: 15px; background: #333; color: white; border: none; text-align: center; font-size: 1.6em; border-radius: 15px; font-weight: bold; }
        
        .end-game-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #222; padding: 10px; border-radius: 12px; }
        .end-game-row span { font-weight: bold; font-size: 1.1em; color: var(--gold); }
        .end-game-row input { width: 100px; background: #444; border: none; color: white; padding: 8px; text-align: center; border-radius: 8px; font-size: 1.1em; }

        /* פריטים בחלון ההגדרות */
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; font-weight: bold; }
        .setting-item input[type="number"] { width: 70px; padding: 8px; border-radius: 8px; border: 1px solid #555; background: #2a2a2a; color: white; text-align: center; font-size: 1.1em;}
        .setting-item button { padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-sync { width: 100%; background-color: #2196F3; font-size: 1.1em; padding: 12px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer;}
        .btn-reset { width: 100%; background-color: #d32f2f; color: white; padding: 14px; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 15px; }

        @keyframes pulseZero { 0%, 100% { transform: scale(1.1); } 50% { transform: scale(1.3); } }

        @media (max-width: 768px) {
            #splashLogo { width: 220px; height: 220px; } 
            .setup-card, .modal, #rebuyModal, #endGameModal { width: 90%; padding: 20px; }
            .setup-card input, .modal-input { width: 95%; }
            .poker-table { width: 90vw; height: 55vh; border-width: 8px; }
            .poker-table::after { font-size: 8vw; }
            .player-seat { width: 62px; height: 62px; font-size: 11px; }
            .player-seat span:last-child { font-size: 1.1em !important; }
            .time-val { font-size: 25vw; }
            .game-clock { font-size: 4.5vw; padding: 6px 14px; }
            .blind-nav-btn { padding: 6px 10px; font-size: 1rem; }
            .blind-info { padding: 4px 12px; gap: 4px; }
            .chip-icon { width: 6.5vw; height: 6.5vw; font-size: 3.2vw; }
            .total-pot-container { margin-top: 68vh; }
            .total-pot-container h2 { font-size: 15vw; }
            .controls { width: 90%; justify-content: center; left: 50%; transform: translateX(-50%); bottom: 60px; }
            .btn { padding: 10px 16px; font-size: 1em; }
        }
    </style>
</head>
<body dir="rtl">

<div id="progressBar"></div>

<div id="splashScreen">
    <div id="splashLogo"></div>
</div>

<div id="setupScreen">
    <div class="setup-card">
        <h1 style="color:var(--gold); font-size: 2.5em; margin-bottom:10px;">פווקר 2025</h1>
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px;">
            <div><p style="font-size: 0.8em; margin: 5px 0;">כניסה</p><input type="number" id="initialBuyin" class="num-input" value="50"></div>
            <div><p style="font-size: 0.8em; margin: 5px 0;">זמן (ש')</p><input type="number" id="roundTimeInput" class="num-input" value="30"></div>
            <div><p style="font-size: 0.8em; margin: 5px 0;">נבחרו</p><div id="activeCountDisplay" style="font-size: 1.8em; font-weight: bold; color: var(--gold); margin-top:10px;">0</div></div>
        </div>
        <hr style="border:0; border-top:1px solid #333; margin-bottom: 10px;">
        <p style="color:#aaa; font-size:0.9em; margin: 0 0 10px 0;">בחר שחקנים לערב זה:</p>
        
        <div class="friends-grid" id="friendsGrid"></div>
        
        <br>
        <button class="btn" style="color:var(--gold); width:100%; font-size: 1.4em;" onclick="startGame()">צאו לדרך</button>
    </div>
</div>

<div class="slider-wrapper" id="slider">
    <div class="page" id="timerPage">
        <div class="admin-header">
            <div class="blind-container">
                <button class="blind-nav-btn" onclick="previousLevel(event)">▼</button>
                <div id="blindDisplay" class="blind-info"></div>
                <button class="blind-nav-btn" onclick="nextLevel(event)">▲</button>
            </div>
            <div class="game-clock" id="gameClock">00:00:00</div>
        </div>
        <div class="logo-container"><div class="app-logo"></div></div>
        <div class="timer top"><span class="time-val">30</span></div>
        <div class="timer left"><span class="time-val">30</span></div>
        <div class="timer right"><span class="time-val">30</span></div>
        <div class="timer bottom"><span class="time-val">30</span></div>
        <div class="controls" style="bottom: 20px; right: 20px; left: auto;"><button class="btn" onclick="addTime(event)" style="border-color: var(--gold); color: var(--gold); font-size: 0.9em;">TIME BANK</button></div>
    </div>

    <div class="page" id="tablePage">
        <div class="poker-table" id="seatsContainer">
            <div class="table-inner-line"></div>
        </div>
        <div class="total-pot-container">
            <p style="color:#666; margin:0; font-weight: bold; letter-spacing: 1px;">TOTAL BANK</p>
            <h2 id="potDisplay">0</h2>
        </div>
        <div class="controls">
            <button class="btn" onclick="openEndGame(event)" style="border-color: var(--danger); color: var(--danger);">FINISH GAME</button>
        </div>
    </div>
</div>

<div class="page-dots"><div class="dot active" id="dot0"></div><div class="dot" id="dot1"></div></div>

<button id="settings-gear-btn" onclick="openSettings()">⚙️</button>

<div class="settings-overlay" id="settings-overlay" onclick="closeSettings()"></div>
<div id="settings-modal" class="modal">
    <h2 style="color:var(--gold); margin-top: 0;">הגדרות משחק</h2>
    
    <div class="setting-item">
        <label>זמן סבב (שניות):</label>
        <input type="number" id="settings-round-time" min="5" max="120" onchange="updateRoundTime(this.value)">
    </div>

    <div class="setting-item">
        <label>אפקטים קוליים:</label>
        <button id="sound-toggle-btn" onclick="toggleSound()" style="background-color: #34c759;">🔊 פעיל</button>
    </div>

    <div class="setting-item">
        <label>מסך דולק (Wake Lock):</label>
        <button id="wakelock-btn" onclick="toggleWakeLockBtn()" style="background-color: var(--gold); color: black;">💡 פעיל</button>
    </div>

    <div style="margin-top: 20px;">
        <button class="btn-sync" onclick="forceGoogleSheetsSync()">🔄 סנכרון נתונים מקומי ל-Sheets</button>
    </div>

    <hr style="border:0; border-top:1px solid #444; margin: 25px 0 15px;">
    
    <button class="btn-reset" onclick="confirmResetGame()">⚠️ איפוס משחק מוחלט</button>
    <button class="btn" style="width:100%; margin-top:10px;" onclick="closeSettings()">סגור</button>
</div>

<div id="rebuyModal">
    <h2 id="rebuyTitle" style="color:var(--gold); margin-bottom: 20px;">עדכון שחקן</h2>
    <input type="text" id="playerNameInput" class="modal-input" placeholder="הכנס שם...">
    <input type="number" id="rebuyAmount" class="modal-input" value="50">
    <button class="btn" style="width:100%; color:var(--gold); margin-bottom: 10px; font-size: 1.3em;" id="confirmBtn">שמור עדכון</button>
    <button class="btn" style="width:100%; color:var(--danger); margin-bottom: 10px;" id="removeBtn">הסר מהשולחן</button>
    <button class="btn" style="width:100%;" onclick="closeRebuy()">ביטול</button>
</div>

<div id="endGameModal">
    <h2 style="color:var(--gold); margin-bottom: 10px;">סיכום וחלוקת כספים</h2>
    <p style="color:#aaa; font-size:0.9em; margin-bottom:20px;">הזן כמה כסף/צ'יפים כל שחקן קיבל בסיום</p>
    <div id="endGamePlayersContainer"></div>
    <div style="margin: 20px 0; padding: 10px; background:#222; border-radius:10px;">
        <span style="color:#aaa;">קופה כוללת: </span><span id="endGameTotalBank" style="font-weight:bold; color:var(--gold);">0</span><br>
        <span style="color:#aaa;">סכום שחולק: </span><span id="endGameDistributed" style="font-weight:bold; color:white;">0</span>
    </div>
    <div id="validationMessage" style="color:var(--danger); margin-bottom:15px; font-weight:bold; display:none;">הסכום שחולק אינו תואם לקופה!</div>
    <button class="btn" id="finishAndSendBtn" style="width:100%; color:var(--success); border-color:var(--success); margin-bottom: 10px;" onclick="submitGameHistory()">הפק דוח וסיים משחק</button>
    <button class="btn" id="cancelEndGameBtn" style="width:100%;" onclick="closeEndGame()">חזור למשחק</button>
</div>

<script>
    function safeGetLocal() { try { return localStorage.getItem('pokerPendingSync'); } catch(e) { return null; } }
    function safeSetLocal(val) { try { localStorage.setItem('pokerPendingSync', val); } catch(e) {} }
    function safeRemoveLocal() { try { localStorage.removeItem('pokerPendingSync'); } catch(e) {} }

    const splash = document.getElementById('splashScreen');
    function deactivateSplash() {
        if (splash && splash.style.display !== 'none') {
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; }, 800);
        }
        try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    setTimeout(deactivateSplash, 3000);

    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxkx46PqRDcXpXRcKgpViKCH6bxHfVq52a2cUReFqjXh3QBdlVFwCA9yoEKtctqsPAIsA/exec';
    const fixedFriends = ["מתן", "רועי", "שחר", "דור", "רדיון", "טום", "בן", "תום", "טל"];
    let selectedFriends = [];

    let players = [], totalPot = 0, currentLevelIdx = 0, currentPage = 0;
    let timeLeft = 30, defaultRoundTime = 30, isActionRunning = false, timerId = null, gameClockId = null;
    let startX = 0, lastTap = 0, audioCtx = null, selIdx = -1, startTimeStr = '';
    
    // משתני מערכת חדשים
    let wakeLock = null;
    let isSoundMuted = false;
    let isWakeLockEnabled = true;
    
    const levels = [{s:1,b:2},{s:2,b:4},{s:5,b:10},{s:10,b:20},{s:20,b:40},{s:50,b:100}];
    const chipColors = { 1: '#999', 2: '#1e88e5', 5: '#e53935', 10: '#43a047', 20: '#8e24aa', 50: '#fb8c00', 100: '#111' };

    window.addEventListener('load', () => {
        const pendingData = safeGetLocal();
        if (pendingData) {
            if (confirm('זוהו נתוני משחק קודם שלא נשלחו עקב בעיית אינטרנט. האם לנסות לשלוח אותם עכשיו?')) {
                forceGoogleSheetsSync();
            }
        }
    });

    async function requestWakeLock() {
        try { 
            if ('wakeLock' in navigator && isWakeLockEnabled) { 
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLock.addEventListener('release', () => {});
            } 
        } catch (err) {}
    }

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && isWakeLockEnabled) { 
            await requestWakeLock(); 
        }
    });

    function buildFriendsGrid() {
        const grid = document.getElementById('friendsGrid');
        if(!grid) return;
        grid.innerHTML = '';
        fixedFriends.forEach(name => {
            const el = document.createElement('div');
            el.className = 'friend-circle';
            el.innerHTML = `<span>${name}</span><div class="v-badge">&#10003;</div>`;
            el.onclick = () => toggleFriend(name, el);
            grid.appendChild(el);
        });
    }

    function toggleFriend(name, el) {
        if(selectedFriends.includes(name)) {
            selectedFriends = selectedFriends.filter(f => f !== name);
            el.classList.remove('selected');
        } else {
            selectedFriends.push(name);
            el.classList.add('selected');
        }
        document.getElementById('activeCountDisplay').innerText = selectedFriends.length;
    }
    buildFriendsGrid();

    function playSound(f, d, type = 'sine') {
        if (isSoundMuted) return; // השתקה
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            o.start(); o.stop(audioCtx.currentTime + d);
        } catch(e) {}
    }

    function startGame() {
        if(selectedFriends.length === 0) { alert("חובה לבחור שחקן אחד לפחות!"); return; }
        requestWakeLock();
        try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        const b = +document.getElementById('initialBuyin').value;
        defaultRoundTime = +document.getElementById('roundTimeInput').value || 30;
        timeLeft = defaultRoundTime;
        
        const now = new Date();
        startTimeStr = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
        
        players = []; totalPot = 0;
        selectedFriends.forEach((name, i) => { 
            players.push({ id: i+1, name: name, in: b, joinTime: startTimeStr, leaveTime: 'עדין במשחק', removed: false }); 
            totalPot += b; 
        });
        
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('slider').style.display = 'flex';
        render(); updateUI();
    }

    document.addEventListener('touchstart', e => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        startX = e.touches[0].clientX;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        const splashScreenObj = document.getElementById('splashScreen');
        // התעלמות מגרירה אם לוחצים על אזורים לחיצים מסוימים
        if(e.target.closest('.btn') || e.target.closest('.blind-nav-btn') || e.target.closest('#settings-gear-btn') || e.target.closest('.player-seat') || e.target.closest('.modal') || e.target.closest('.settings-overlay') || (splashScreenObj && splashScreenObj.style.display !== 'none')) return;
        
        const diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 60) {
            currentPage = diff > 0 ? 1 : 0;
            document.getElementById('slider').style.transform = `translateX(-${currentPage * 100}vw)`;
            document.getElementById('dot0').classList.toggle('active', currentPage === 0);
            document.getElementById('dot1').classList.toggle('active', currentPage === 1);
        }
    });

    document.body.addEventListener('pointerdown', e => {
        const splashScreenObj = document.getElementById('splashScreen');
        if(currentPage === 1 || (splashScreenObj && splashScreenObj.style.display !== 'none')) return;
        
        // עצירת הפעלת הטיימר אם לחצו על אלמנטים אינטראקטיביים
        if(e.target.closest('.btn') || e.target.closest('.blind-nav-btn') || e.target.closest('#settings-gear-btn') || e.target.closest('.modal') || e.target.closest('.settings-overlay') || e.target.closest('#setupScreen')) return;
        
        if(!gameClockId) startClock();
        const now = Date.now();
        
        if(now - lastTap < 300) { 
            clearInterval(timerId); isActionRunning = false; timeLeft = defaultRoundTime; 
        } else {
            if(isActionRunning) { 
                clearInterval(timerId); isActionRunning = false; 
            } else {
                if(timeLeft === 0) timeLeft = defaultRoundTime;
                isActionRunning = true;
                timerId = setInterval(() => {
                    if(timeLeft > 0) {
                        timeLeft--; 
                        if(timeLeft === 10) playSound(523, 0.1, 'sine');
                        if(timeLeft <= 5 && timeLeft > 0) playSound(659, 0.05, 'sine');
                        if(timeLeft === 0) playSound(330, 0.7, 'triangle');
                    } else {
                        clearInterval(timerId); isActionRunning = false;
                    }
                    updateUI();
                }, 1000);
            }
        }
        lastTap = now; updateUI();
    });

    function startClock() {
        let sec = 0;
        gameClockId = setInterval(() => {
            sec++;
            const h = Math.floor(sec/3600).toString().padStart(2,'0');
            const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
            const s = (sec%60).toString().padStart(2,'0');
            document.getElementById('gameClock').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    function render() {
        const container = document.getElementById('seatsContainer');
        container.innerHTML = '<div class="table-inner-line"></div>';
        const activePlayers = players.filter(p => !p.removed);
        
        activePlayers.forEach((p, i) => {
            const angle = (i / activePlayers.length) * Math.PI * 2 + Math.PI/2;
            const x = 50 + 46 * Math.cos(angle), y = 50 + 46 * Math.sin(angle);
            const seat = document.createElement('div');
            seat.className = p.removed ? 'player-seat seat-removed' : 'player-seat in-game';
            seat.style.left = x+'%'; seat.style.top = y+'%';
            const displayName = p.name ? p.name : `#${p.id}`;
            seat.innerHTML = `<span style="opacity:0.9; font-weight:bold; color:white; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70px;">${displayName}</span><span style="color:var(--gold); font-weight:bold; font-size:1.2em;">${p.in}</span>`;
            
            const origIdx = players.indexOf(p);
            seat.onclick = (e) => { e.stopPropagation(); openRebuy(origIdx); };
            container.appendChild(seat);
        });
        
        const lvl = levels[currentLevelIdx];
        document.getElementById('blindDisplay').innerHTML = `<div class="chip-icon" style="background:${chipColors[lvl.s]||'#444'}">${lvl.s}</div><span style="color:#555; font-weight:bold">/</span><div class="chip-icon" style="background:${chipColors[lvl.b]||'#222'}">${lvl.b}</div>`;
    }

    function updateUI() {
        document.getElementById('potDisplay').innerText = totalPot;
        document.querySelectorAll('.timer').forEach(el => {
            const valEl = el.querySelector('.time-val');
            valEl.innerText = timeLeft;
            el.classList.remove('ready-active', 'paused-dim', 'warning', 'zero-blink');
            
            if (isActionRunning || timeLeft === defaultRoundTime) el.classList.add('ready-active');
            else el.classList.add('paused-dim');
            
            if (timeLeft <= 10 && timeLeft > 0) el.classList.add('warning');
            if (timeLeft === 0) el.classList.add('zero-blink');
        });

        const percent = (timeLeft / defaultRoundTime) * 100;
        const progressEl = document.getElementById('progressBar');
        if (progressEl) {
            progressEl.style.width = percent + '%';
            if (timeLeft <= 5) {
                progressEl.style.background = 'var(--danger)';
                progressEl.style.boxShadow = '0 0 10px var(--danger)';
            } else {
                progressEl.style.background = 'var(--gold)';
                progressEl.style.boxShadow = '0 0 10px var(--gold)';
            }
        }
    }

    function addTime(e) { e.stopPropagation(); timeLeft += defaultRoundTime; updateUI(); }
    
    /* --- ניווט בליינדים חדש --- */
    function nextLevel(e) { 
        if(e) e.stopPropagation(); 
        if(currentLevelIdx < levels.length-1) {
            currentLevelIdx++; 
            render(); 
        }
    }
    
    function previousLevel(e) {
        if(e) e.stopPropagation();
        if(currentLevelIdx > 0) {
            currentLevelIdx--;
            render();
        } else {
            alert("אתה נמצא בשלב הבליינדים הראשון.");
        }
    }
    
    /* --- פונקציות הגדרות (Settings) --- */
    function openSettings() {
        // עצירת הזמן הראשי כדי שהשעון לא ירוץ ברקע בזמן ההגדרות
        if (isActionRunning) {
            clearInterval(timerId); 
            isActionRunning = false; 
            updateUI();
        }
        document.getElementById('settings-round-time').value = defaultRoundTime;
        document.getElementById('settings-overlay').style.display = 'block';
        document.getElementById('settings-modal').style.display = 'block';
    }

    function closeSettings() { 
        document.getElementById('settings-overlay').style.display = 'none';
        document.getElementById('settings-modal').style.display = 'none'; 
    }

    function updateRoundTime(val) {
        let v = parseInt(val);
        if(v >= 5) {
            defaultRoundTime = v;
        }
    }

    function toggleSound() {
        isSoundMuted = !isSoundMuted;
        const btn = document.getElementById('sound-toggle-btn');
        if (isSoundMuted) {
            btn.innerHTML = "🔇 מושתק";
            btn.style.backgroundColor = "#555";
        } else {
            btn.innerHTML = "🔊 פעיל";
            btn.style.backgroundColor = "#34c759";
        }
    }

    function toggleWakeLockBtn() {
        const btn = document.getElementById('wakelock-btn');
        if (isWakeLockEnabled) {
            if (wakeLock !== null) { wakeLock.release().then(() => wakeLock = null); }
            isWakeLockEnabled = false;
            btn.innerHTML = "💡 כבוי";
            btn.style.backgroundColor = "#555";
            btn.style.color = "white";
        } else {
            isWakeLockEnabled = true;
            requestWakeLock();
            btn.innerHTML = "💡 פעיל";
            btn.style.backgroundColor = "var(--gold)";
            btn.style.color = "black";
        }
    }

    function forceGoogleSheetsSync() {
        const pendingData = safeGetLocal();
        if (!pendingData) {
            alert("אין נתונים מקומיים שממתינים לסנכרון כרגע. הכל מסונכרן!");
            return;
        }
        
        const btn = document.querySelector('.btn-sync');
        btn.innerText = 'מנסה לסנכרן...';
        
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: pendingData
        })
        .then(() => { 
            alert('הנתונים נשלחו בהצלחה לגוגל שיטס!'); 
            safeRemoveLocal(); 
            btn.innerText = '🔄 סנכרון נתונים מקומי ל-Sheets';
        })
        .catch(err => { 
            alert('עדיין אין חיבור יציב לאינטרנט. נסה שוב מאוחר יותר.'); 
            btn.innerText = '🔄 סנכרון נתונים מקומי ל-Sheets';
        });
    }

    function confirmResetGame() {
        if(confirm("האם אתה בטוח שברצונך לאפס את כל המשחק? כל הנתונים הנוכחיים יימחקו ותוחזר למסך הראשי!")) {
            if (wakeLock !== null) { wakeLock.release().then(() => wakeLock = null); }
            window.location.reload();
        }
    }

    /* --- ריביי וסיום משחק (נשאר זהה) --- */
    function openRebuy(i) { 
        selIdx = i; 
        document.getElementById('rebuyTitle').innerText = players[i].name; 
        document.getElementById('playerNameInput').value = players[i].name; 
        document.getElementById('rebuyAmount').value = 50; 
        document.getElementById('rebuyModal').style.display = 'block'; 
    }
    function closeRebuy() { document.getElementById('rebuyModal').style.display = 'none'; }
    
    document.getElementById('confirmBtn').onclick = () => { 
        players[selIdx].name = document.getElementById('playerNameInput').value; 
        const addAmount = +document.getElementById('rebuyAmount').value; 
        if(addAmount > 0) { players[selIdx].in += addAmount; totalPot += addAmount; } 
        render(); closeRebuy(); updateUI(); 
    };
    
    document.getElementById('removeBtn').onclick = () => { 
        const now = new Date();
        players[selIdx].leaveTime = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
        players[selIdx].removed = true;
        render(); closeRebuy(); updateUI(); 
    };

    function openEndGame(e) {
        if(e) e.stopPropagation();
        clearInterval(timerId); isActionRunning = false; updateUI();
        document.getElementById('endGameTotalBank').innerText = totalPot;
        const container = document.getElementById('endGamePlayersContainer');
        container.innerHTML = '';
        
        players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'end-game-row';
            div.innerHTML = `
                <span>${p.name} (השקיע: ${p.in})</span>
                <input type="number" class="end-game-out-input" data-idx="${i}" value="0" oninput="calculateDistribution()">
            `;
            container.appendChild(div);
        });
        calculateDistribution();
        document.getElementById('endGameModal').style.display = 'block';
    }
    function closeEndGame() { document.getElementById('endGameModal').style.display = 'none'; }

    function calculateDistribution() {
        const inputs = document.querySelectorAll('.end-game-out-input');
        let totalOut = 0;
        inputs.forEach(input => { totalOut += +input.value || 0; });
        document.getElementById('endGameDistributed').innerText = totalOut;
        
        if(totalOut === totalPot) {
            document.getElementById('endGameDistributed').style.color = 'var(--success)';
            document.getElementById('validationMessage').style.display = 'none';
        } else {
            document.getElementById('endGameDistributed').style.color = 'var(--danger)';
        }
    }

    function submitGameHistory() {
        const inputs = document.querySelectorAll('.end-game-out-input');
        let totalOut = 0;
        inputs.forEach(input => { totalOut += +input.value || 0; });
        
        if(totalOut !== totalPot) {
            document.getElementById('validationMessage').style.display = 'block';
            return;
        }

        const sendBtn = document.getElementById('finishAndSendBtn');
        const cancelBtn = document.getElementById('cancelEndGameBtn');
        sendBtn.disabled = true;
        sendBtn.innerText = 'שומר נתונים...';
        cancelBtn.style.display = 'none';

        const now = new Date();
        const dateStr = now.toLocaleDateString('he-IL');
        const endTimeStr = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
        
        const payload = players.map((p, i) => {
            const outVal = +inputs[i].value || 0;
            const netProfit = outVal - p.in;
            const finalLeaveTime = p.leaveTime === 'עדין במשחק' ? endTimeStr : p.leaveTime;
            
            return {
                date: dateStr,
                name: p.name,
                joinTime: p.joinTime,
                leaveTime: finalLeaveTime,
                buyIn: p.in,
                cashOut: outVal,
                net: netProfit
            };
        });

        const payloadStr = JSON.stringify(payload);
        safeSetLocal(payloadStr);

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: payloadStr
        })
        .then(() => {
            safeRemoveLocal();
            alert('המשחק הסתיים בהצלחה! הנתונים נשמרו בגיליון.');
            if (wakeLock !== null) { wakeLock.release().then(() => wakeLock = null); }
            location.reload();
        })
        .catch(err => {
            alert('שגיאת רשת! הנתונים נשמרו מקומית על המכשיר שלך. בפעם הבאה שתפתח את המערכת עם אינטרנט, תוקפץ הודעה לשלוח אותם שוב.');
            if (wakeLock !== null) { wakeLock.release().then(() => wakeLock = null); }
            location.reload();
        });
    }
</script>
</body>
