<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שעון פוקר מקצועי</title>
    <style>
        /* עיצוב כללי ומראה כהה יוקרתי לפוקר */
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* קונטיינר ראשי למסכים */
        .app-container {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
        }

        /* הגדרת מסכים ומעברים חלקים */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* מסך 1: הגדרות המשחק בסדר המבוקש */
        .setup-container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .setup-title {
            text-align: center;
            margin: 0 0 10px 0;
            color: #ffcc00;
        }

        .template-card {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
        }

        .template-card label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ccc;
        }

        .template-card input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #222;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* מסך 2: שולחן המשחק ושעון העצר */
        .table-view {
            text-align: center;
        }

        .poker-table-graphic {
            width: 280px;
            height: 150px;
            border: 8px solid #8b5a2b;
            background-color: #1b663b;
            border-radius: 100px;
            margin: 20px auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-timer {
            font-size: 64px;
            font-weight: bold;
            font-family: monospace;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
        }

        /* כפתורי ניווט כלליים */
        .btn {
            background: #ffcc00;
            color: #121212;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #e6b800;
        }

        /* פיקס קבוצה 2: כפתורים תחתונים ומניעת כפל מיקומים */
        .settings-btn {
            position: absolute !important;
            bottom: 25px !important;
            left: 25px !important;
            right: auto !important;
            top: auto !important;
            background: #333;
            border: 1px solid #555;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .settings-btn svg {
            fill: #fff;
            width: 24px;
            height: 24px;
        }

        .time-bank-btn {
            position: absolute !important;
            bottom: 25px !important;
            right: 25px !important;
            left: auto !important;
            top: auto !important;
            background: #cc3333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(204,51,51,0.3);
            z-index: 100;
        }

        /* פיקס קבוצה 4: אינדיקטור נקודות ניווט בתחתית המסך */
        .nav-indicators {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 90;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s, transform 0.3s;
            cursor: pointer;
        }

        /* הנקודה הפעילה מקבלת צבע זהב בולט */
        .dot.active {
            background: #ffcc00;
            transform: scale(1.2);
            box-shadow: 0 0 8px #ffcc00;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <div id="screen-setup" class="screen active">
            <div class="setup-container">
                <h2 class="setup-title">הגדרות הטורניר</h2>
                
                <div class="template-card">
                    <label for="input-round-time">זמן סיבוב (בדקות)</label>
                    <input type="number" id="input-round-time" value="15" min="1">
                </div>

                <div class="template-card">
                    <label for="input-buyin">כמה כל כניסה (Buy-In)</label>
                    <input type="number" id="input-buyin" value="100" min="0">
                </div>

                <div class="template-card">
                    <label for="input-players">כמות משתתפים נבחרו</label>
                    <input type="number" id="input-players" value="8" min="2" max="10">
                </div>

                <button class="btn" style="margin-top: 10px;" onclick="navigateToScreen(1)">אישור והמשך לשולחן</button>
            </div>
        </div>

        <div id="screen-table" class="screen">
            <div class="table-view">
                <h2>שולחן משחק פעיל</h2>
                <div class="big-timer" id="timer-display">15:00</div>
                
                <div class="poker-table-graphic">
                    <span style="color: rgba(255,255,255,0.7); font-size: 14px;">Binyamina Table</span>
                </div>

                <button class="btn" onclick="navigateToScreen(0)">חזרה להגדרות</button>
            </div>
        </div>

        <button class="settings-btn" onclick="alert('פתיחת הגדרות מתקדמות')" title="הגדרות">
            <svg viewBox="0 0 24 24">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12c0,0.31,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
        </button>

        <button class="time-bank-btn" onclick="alert('Time Bank הופעל!')">TIME BANK</button>

        <div class="nav-indicators">
            <div class="dot active" onclick="navigateToScreen(0)" title="מסך הגדרות ושעון"></div>
            <div class="dot" onclick="navigateToScreen(1)" title="מסך שולחן המשחק"></div>
        </div>

    </div>

    <script>
        // פונקציית הניווט המתוקנת המנהלת את המסכים ואת הנקודות
        function navigateToScreen(screenIndex) {
            const screens = [
                document.getElementById('screen-setup'),
                document.getElementById('screen-table')
            ];
            const dots = document.querySelectorAll('.dot');

            // 1. הסתרת כל המסכים קודם כל
            screens.forEach(screen => {
                screen.classList.remove('active');
                setTimeout(() => {
                    if (!screen.classList.contains('active')) {
                        screen.style.display = 'none';
                    }
                }, 300); // תואם את זמן ה-transition ב-CSS
            });

            // 2. הצגת המסך הנבחר עם אפקט הופעה חלק
            const targetScreen = screens[screenIndex];
            if (targetScreen) {
                targetScreen.style.display = 'flex';
                // שימוש ב-setTimeout קצר מאפשר ל-browser לרנדר את ה-display לפני ה-opacity לקבלת אנימציה
                setTimeout(() => {
                    targetScreen.classList.add('active');
                }, 10);
            }

            // 3. תיקון האינדיקציה ההפוכה של הנקודות
            dots.forEach((dot, index) => {
                if (index === screenIndex) {
                    dot.classList.add('active'); // הנקודה הנכונה נצבעת בזהב
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // עדכון דינמי ראשוני של ערך הטיימר בהתאם לשדה זמן סיבוב
        const roundTimeInput = document.getElementById('input-round-time');
        const timerDisplay = document.getElementById('timer-display');
        
        roundTimeInput.addEventListener('input', (e) => {
            let minutes = parseInt(e.target.value) || 0;
            timerDisplay.textContent = (minutes < 10 ? '0' : '') + minutes + ':00';
        });
    </script>
</body>
</html>
