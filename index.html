<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>העיגול - Poker OS Premium</title>
    <style>
        :root { --gold: #ffcc00; --danger: #ff3b30; }
        body {
            margin: 0; background-color: black; color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; overflow: hidden; user-select: none;
        }
        
        #setupScreen { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .setup-card { background: #1a1a1a; padding: 40px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; width: 300px; }
        .setup-card input { background: #333; border: none; color: white; padding: 15px; border-radius: 10px; width: 80px; text-align: center; font-size: 1.5em; margin: 10px; }
        
        .slider-wrapper {
            display: flex; width: 200vw; height: 100vh;
            transition: transform 0.5s cubic-bezier(0.2, 0, 0.2, 1);
            display: none;
        }
        .page { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

        /* כותרת ניהול */
        .admin-header {
            position: absolute; top: 15px; width: 90%; left: 5%;
            display: flex; justify-content: space-between; align-items: flex-start; z-index: 30;
        }
        
        /* לוגו מרכזי - מוגדל */
        .logo-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1; text-align: center;
        }
        .app-logo {
            width: 320px; height: 320px;
            background-image: url('logo.png'); background-size: contain; background-repeat: no-repeat;
            background-position: center;
        }

        /* שעון כללי - בולט יותר */
        .game-clock { 
            font-size: 2.2vw; 
            font-family: monospace; 
            color: rgba(255, 255, 255, 0.7); /* העלאת אופסיטי מ-0.3 ל-0.7 */
            font-weight: bold;
        }

        .blind-info { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px;
        }

        /* טיימרים */
        .timer {
            position: absolute; display: flex; justify-content: center; align-items: center;
            font-weight: 900; transition: opacity 0.3s ease; pointer-events: none; z-index: 10;
        }
        .time-val { font-size: 18vw; display: inline-block; width: 1.2em; text-align: center; transition: transform 0.2s ease; }

        .ready-active { opacity: 1 !important; }
        .paused-dim { opacity: 0.3 !important; } 
        
        .warning .time-val { color: var(--danger); transform: scale(1.15); }
        .zero-blink .time-val { animation: pulseZero 0.5s infinite; color: var(--danger); }

        /* מיקומי טיימרים */
        .top { top: 7vh; left: 50%; transform: translateX(-50%) rotate(180deg); }
        .bottom { bottom: 6vh; left: 50%; transform: translateX(-50%); } /* הורדה למטה */
        .left { left: 1vw; top: 50%; transform: translateY(-50%) rotate(90deg); }
        .right { right: 1vw; top: 50%; transform: translateY(-50%) rotate(-90deg); }

        /* שולחן פוקר */
        .poker-table {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 75vw; height: 42vh; border: 12px solid #222; border-radius: 160px;
            background: radial-gradient(circle, #246b24 0%, #113811 100%);
            box-shadow: inset 0 0 60px #000;
        }
        .player-seat {
            position: absolute; width: 80px; height: 80px; background: #151515;
            border: 2px solid #333; border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 12px; transform: translate(-50%, -50%);
        }

        .chip-icon {
            display: inline-flex; justify-content: center; align-items: center;
            width: 3.5vw; height: 3.5vw; border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.3);
            font-weight: bold; font-size: 1.6vw; color: white;
        }

        .total-pot-container { text-align: center; margin-top: 78vh; }
        .total-pot-container h2 { font-size: 7vw; color: var(--gold); margin: 0; }

        .page-dots {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 100;
        }
        .dot { width: 10px; height: 10px; background: #333; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--gold); width: 30px; border-radius: 10px; }

        /* כפתורי שליטה */
        .controls { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 15px; z-index: 40; }
        .btn { background: #1a1a1a; border: 1px solid #444; color: white; padding: 14px 24px; border-radius: 14px; font-weight: bold; }

        @keyframes pulseZero { 0%, 100% { transform: scale(1.1); } 50% { transform: scale(1.3); } }
        #rebuyModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border-radius: 25px; border: 2px solid var(--gold); z-index: 10000; text-align: center; width: 280px; }
    </style>
</head>
<body>

<div id="setupScreen">
    <div class="setup-card">
        <h1 style="color:var(--gold); font-size: 2.5em;">העיגול</h1>
        <p>שחקנים</p>
        <input type="number" id="playerCount" value="8">
        <p>כניסה</p>
        <input type="number" id="initialBuyin" value="50">
        <br><br>
        <button class="btn" style="color:var(--gold); width:100%;" onclick="startGame()">צאו לדרך</button>
    </div>
</div>

<div class="slider-wrapper" id="slider">
    <div class="page" id="timerPage">
        <div class="admin-header">
            <div id="blindDisplay" class="blind-info"></div>
            <div class="game-clock" id="gameClock">00:00:00</div>
        </div>
        <div class="logo-container"><div class="app-logo"></div></div>
        
        <div class="timer top"><span class="time-val">30</span></div>
        <div class="timer left"><span class="time-val">30</span></div>
        <div class="timer right"><span class="time-val">30</span></div>
        <div class="timer bottom"><span class="time-val">30</span></div>

        <div class="controls" style="bottom: 20px; left: 20px;">
            <button class="btn" onclick="addTime(event)" style="border-color: var(--gold); color: var(--gold); font-size: 0.8em; padding: 10px 18px;">TIME BANK</button>
        </div>
    </div>

    <div class="page" id="tablePage">
        <div class="poker-table" id="seatsContainer"></div>
        <div class="total-pot-container">
            <p style="color:#666; margin:0; font-weight: bold;">TOTAL BANK</p>
            <h2 id="potDisplay">0</h2>
        </div>
        <div class="controls">
            <button class="btn" onclick="nextLevel(event)">NEXT LEVEL</button>
        </div>
    </div>
</div>

<div class="page-dots">
    <div class="dot active" id="dot0"></div>
    <div class="dot" id="dot1"></div>
</div>

<div id="rebuyModal">
    <h2 id="rebuyTitle" style="color:var(--gold);">שחקן</h2>
    <input type="number" id="rebuyAmount" value="50" style="width:80%; padding:15px; margin-bottom:15px; background:#333; color:white; border:none; text-align:center; font-size: 1.5em; border-radius: 10px;">
    <button class="btn" style="width:100%; color:var(--gold);" id="confirmBtn">עדכן</button>
    <button class="btn" style="width:100%; color:var(--danger); margin-top:10px" id="removeBtn">הסר</button>
    <button class="btn" style="width:100%; margin-top:10px" onclick="closeRebuy()">ביטול</button>
</div>

<script>
    let players = [], totalPot = 0, currentLevelIdx = 0, currentPage = 0;
    let timeLeft = 30, isActionRunning = false, timerId = null, gameClockId = null;
    let startX = 0, lastTap = 0, audioCtx = null;
    const levels = [{s:1,b:2},{s:2,b:4},{s:5,b:10},{s:10,b:20},{s:20,b:40},{s:50,b:100}];
    const chipColors = { 1: '#999', 2: '#1e88e5', 5: '#e53935', 10: '#43a047', 20: '#8e24aa', 50: '#fb8c00', 100: '#111' };

    function playSound(f, d) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function startGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const c = +document.getElementById('playerCount').value;
        const b = +document.getElementById('initialBuyin').value;
        players = []; totalPot = 0;
        for(let i=0; i<c; i++) { players.push({id:i+1, in:b}); totalPot += b; }
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('slider').style.display = 'flex';
        render(); updateUI();
    }

    document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.addEventListener('touchend', e => {
        if(e.target.closest('.btn') || e.target.closest('.player-seat')) return;
        const diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 60) {
            currentPage = diff > 0 ? 1 : 0;
            document.getElementById('slider').style.transform = `translateX(-${currentPage * 100}vw)`;
            document.getElementById('dot0').classList.toggle('active', currentPage === 0);
            document.getElementById('dot1').classList.toggle('active', currentPage === 1);
        }
    });

    document.body.addEventListener('pointerdown', e => {
        if(e.target.closest('.btn') || e.target.closest('.player-seat') || e.target.closest('#rebuyModal') || e.target.closest('#setupScreen')) return;
        if(!gameClockId) startClock();
        const now = Date.now();
        if(now - lastTap < 300) { 
            clearInterval(timerId); isActionRunning = false; timeLeft = 30; 
        } else {
            if(isActionRunning) { clearInterval(timerId); isActionRunning = false; }
            else {
                if(timeLeft === 0) timeLeft = 30;
                isActionRunning = true;
                timerId = setInterval(() => {
                    if(timeLeft > 0) {
                        timeLeft--; if(timeLeft <= 5) playSound(440, 0.1);
                    } else {
                        playSound(880, 0.5); clearInterval(timerId); isActionRunning = false;
                    }
                    updateUI();
                }, 1000);
            }
        }
        lastTap = now; updateUI();
    });

    function startClock() {
        let sec = 0;
        gameClockId = setInterval(() => {
            sec++;
            const h = Math.floor(sec/3600).toString().padStart(2,'0');
            const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
            const s = (sec%60).toString().padStart(2,'0');
            document.getElementById('gameClock').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    function render() {
        const container = document.getElementById('seatsContainer');
        container.innerHTML = '';
        players.forEach((p, i) => {
            const angle = (i / players.length) * Math.PI * 2 + Math.PI/2;
            const x = 50 + 46 * Math.cos(angle), y = 50 + 46 * Math.sin(angle);
            const seat = document.createElement('div');
            seat.className = 'player-seat';
            seat.style.left = x+'%'; seat.style.top = y+'%';
            seat.innerHTML = `<span style="opacity:0.6">#${p.id}</span><span style="color:var(--gold);font-weight:bold;">${p.in}</span>`;
            seat.onclick = (e) => { e.stopPropagation(); openRebuy(i); };
            container.appendChild(seat);
        });
        const lvl = levels[currentLevelIdx];
        document.getElementById('blindDisplay').innerHTML = `
            <div class="chip-icon" style="background:${chipColors[lvl.s]||'#444'}">${lvl.s}</div>
            <span style="color:#555; font-weight:bold">/</span>
            <div class="chip-icon" style="background:${chipColors[lvl.b]||'#222'}">${lvl.b}</div>
        `;
    }

    function updateUI() {
        document.getElementById('potDisplay').innerText = totalPot;
        document.querySelectorAll('.timer').forEach(el => {
            const valEl = el.querySelector('.time-val');
            valEl.innerText = timeLeft;
            el.classList.remove('ready-active', 'paused-dim', 'warning', 'zero-blink');
            
            if (isActionRunning || timeLeft === 30) {
                el.classList.add('ready-active');
            } else {
                el.classList.add('paused-dim');
            }

            if (timeLeft <= 10 && timeLeft > 0) el.classList.add('warning');
            if (timeLeft === 0) el.classList.add('zero-blink');
        });
    }

    function addTime(e) { e.stopPropagation(); timeLeft += 30; updateUI(); }
    function nextLevel(e) { e.stopPropagation(); if(currentLevelIdx < levels.length-1) currentLevelIdx++; render(); }
    
    let selIdx = null;
    function openRebuy(i) { selIdx = i; document.getElementById('rebuyTitle').innerText = `שחקן ${players[i].id}`; document.getElementById('rebuyModal').style.display = 'block'; }
    function closeRebuy() { document.getElementById('rebuyModal').style.display = 'none'; }
    document.getElementById('confirmBtn').onclick = () => { const v = +document.getElementById('rebuyAmount').value; if(v){players[selIdx].in += v; totalPot += v; render(); closeRebuy(); updateUI();} };
    document.getElementById('removeBtn').onclick = () => { players.splice(selIdx, 1); render(); closeRebuy(); updateUI(); };
</script>
</body>
</html>
